<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WFM Sizer - Final with Export</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        nav { margin-bottom: 20px; }
        nav a { text-decoration: none; color: #4472c4; font-weight: bold; margin-right: 15px; }
        
        .main-wrapper {
            display: flex;
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            width: fit-content;
        }

        .labels-column { min-width: 220px; margin-top: 45px; }
        .label-cell {
            height: 30px;
            display: flex;
            align-items: center;
            border: 1px solid #bbb;
            padding-left: 8px;
            background: #f8f9fa;
            font-size: 13px;
            margin-bottom: -1px; 
        }
        .label-cell.bold { font-weight: bold; background-color: #ebf1de; }

        #container { display: flex; }
        .scenario-col { width: 140px; text-align: center; }
        .scenario-header {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #d9e1f2;
            border: 1px solid #bbb;
            margin-left: -1px;
            position: relative;
        }
        .scenario-header input { width: 80%; text-align: center; border: none; font-weight: bold; background: transparent; }

        .data-cell { height: 30px; border: 1px solid #bbb; margin-bottom: -1px; margin-left: -1px; display: flex; align-items: center; justify-content: center; position: relative; }
        input[type="number"] { width: 100%; height: 100%; border: none; text-align: center; font-size: 13px; outline: none; }

        .result-cell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .bold-res { font-weight: bold; background-color: #f2f2f2; }
        
        .cap-box { position: absolute; right: 2px; width: 32px !important; font-size: 10px !important; background: #ffffcc; border: 1px solid #ccc !important; height: 18px !important; }

        .btn-add { background: #4472c4; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; margin-bottom: 15px; border-radius: 4px; }
        .btn-export { background: #217346; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; margin-bottom: 15px; margin-left: 10px; border-radius: 4px; }
        .btn-del { color: #d9534f; cursor: pointer; border: none; background: none; font-size: 14px; position: absolute; right: 2px; top: 2px; }
    </style>
</head>
<body>

<nav><a href="index.html">Scheduler</a> | <a href="sizer.html">Sizer</a></nav>
<button class="btn-add" onclick="addScenario()">＋ Add Scenario</button>
<button class="btn-export" onclick="exportToExcel()">📊 Export to Excel</button>

<div class="main-wrapper" id="sizer-table">
    <div class="labels-column">
        <div class="label-cell">Monthly Volume</div>
        <div class="label-cell">AHT (seconds)</div>
        <div class="label-cell">HOOP (week)</div>
        <div class="label-cell">SL %</div>
        <div class="label-cell">SL (seconds)</div>
        <div class="label-cell">Concurrency</div>
        <div class="label-cell bold">Weekly Volume</div>
        <div class="label-cell bold">Hours Required Weekly</div>
        <div class="label-cell bold">Occupancy Rate</div>
        <div class="label-cell bold">Required FTE</div>
        <div class="label-cell">Paid Break %</div>
        <div class="label-cell">Coaching/Meeting %</div>
        <div class="label-cell">Outbound time %</div>
        <div class="label-cell">Absenteeism %</div>
        <div class="label-cell">Leave %</div>
        <div class="label-cell">SCF</div>
        <div class="label-cell bold">Required Headcount</div>
    </div>
    <div id="container"></div>
</div>

<script>
let scenarioId = 0;

function factorial(n) {
    if (n <= 0) return 1;
    let f = 1;
    for (let i = 1; i <= n; i++) f *= i;
    return f;
}

function erlangC(agents, traffic) {
    if (agents <= traffic) return 1;
    let sum = 0;
    for (let i = 0; i < agents; i++) sum += Math.pow(traffic, i) / factorial(i);
    let top = (Math.pow(traffic, agents) / factorial(agents)) * (agents / (agents - traffic));
    return top / (sum + top);
}

function serviceLevel(agents, traffic, aht, targetTime) {
    if (agents <= traffic) return 0;
    let ec = erlangC(agents, traffic);
    return Math.max(0, 1 - ec * Math.exp(-(agents - traffic) * (targetTime / aht)));
}

function addScenario() {
    scenarioId++;
    let id = scenarioId;
    let col = document.createElement("div");
    col.className = "scenario-col";
    col.id = `sc-${id}`;
    col.innerHTML = `
        <div class="scenario-header">
            <input id="title-${id}" value="Scenario ${id}" onchange="calculate(${id})">
            <button class="btn-del" onclick="removeScenario(${id})">×</button>
        </div>
        <div class="data-cell"><input id="vol-${id}" type="number" value="10000" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="aht-${id}" type="number" value="300" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="hoop-${id}" type="number" value="168" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="sl-${id}" type="number" value="80" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="sls-${id}" type="number" value="20" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="conc-${id}" type="number" value="1" oninput="calculate(${id})"></div>
        <div class="data-cell"><div class="result-cell bold-res" id="wvol-${id}">-</div></div>
        <div class="data-cell"><div class="result-cell bold-res" id="hrs-${id}">-</div></div>
        <div class="data-cell">
            <input id="cap-${id}" type="number" value="85" class="cap-box" title="Occ Cap %" oninput="calculate(${id})">
            <div class="result-cell bold-res" id="occ-${id}">-</div>
        </div>
        <div class="data-cell"><div class="result-cell bold-res" id="fte-${id}">-</div></div>
        <div class="data-cell"><input id="brk-${id}" type="number" value="6.25" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="coat-${id}" type="number" value="7.75" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="out-${id}" type="number" value="0" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="abs-${id}" type="number" value="12" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="lv-${id}" type="number" value="0" oninput="calculate(${id})"></div>
        <div class="data-cell"><input id="scf-${id}" type="number" value="1.05" oninput="calculate(${id})"></div>
        <div class="data-cell"><div class="result-cell bold-res" id="hc-${id}">-</div></div>
    `;
    document.getElementById("container").appendChild(col);
    calculate(id);
}

function removeScenario(id) { document.getElementById(`sc-${id}`)?.remove(); }

function calculate(id) {
    let vol = +document.getElementById(`vol-${id}`).value || 0;
    let aht = +document.getElementById(`aht-${id}`).value || 0;
    let hoop = +document.getElementById(`hoop-${id}`).value || 1;
    let slT = (+document.getElementById(`sl-${id}`).value || 0) / 100;
    let slS = +document.getElementById(`sls-${id}`).value || 20;
    let conc = +document.getElementById(`conc-${id}`).value || 1;
    let occCap = (+document.getElementById(`cap-${id}`).value || 100) / 100;
    
    let weekly = vol / (52 / 12);
    let traffic = (weekly / hoop * aht) / 3600 / conc;

    if (traffic <= 0) return;

    let agents = Math.ceil(traffic) + 1;
    while (serviceLevel(agents, traffic, aht, slS) < slT && agents < 500) agents++;

    let slH = serviceLevel(agents, traffic, aht, slS);
    let slL = serviceLevel(agents - 1, traffic, aht, slS);
    let fractional = (agents - 1) + (slT - slL) / (slH - slL || 1);

    // Sync with your Excel staff floor logic
    let minRatio = slT > 0.85 ? 0.9 : 0.8035; 
    fractional = Math.max(fractional, minRatio);

    if ((traffic / fractional) > occCap) {
        fractional = traffic / occCap;
    }

    let hours = fractional * hoop;
    let fte = hours / 40; 

    let brk = +document.getElementById(`brk-${id}`).value / 100;
    let coat = +document.getElementById(`coat-${id}`).value / 100;
    let out = +document.getElementById(`out-${id}`).value / 100;
    let abs = +document.getElementById(`abs-${id}`).value / 100;
    let lv = +document.getElementById(`lv-${id}`).value / 100;
    let scf = +document.getElementById(`scf-${id}`).value || 1;

    let shrink = 1 - ((1 - lv) * (1 - abs) * (1 - (brk + coat + out)));
    let hc = (fte / (1 - shrink)) * scf;

    document.getElementById(`wvol-${id}`).innerText = Math.round(weekly).toLocaleString();
    document.getElementById(`hrs-${id}`).innerText = Math.round(hours).toLocaleString();
    document.getElementById(`occ-${id}`).innerText = (traffic / fractional * 100).toFixed(2) + "%";
    document.getElementById(`fte-${id}`).innerText = fte.toFixed(2);
    document.getElementById(`hc-${id}`).innerText = Math.ceil(hc);
}

function exportToExcel() {
    let table = document.getElementById("sizer-table");
    let wb = XLSX.utils.book_new();
    
    // Convert current visible UI values to data array
    let data = [];
    let rows = table.querySelectorAll(".label-cell");
    let scenarios = document.querySelectorAll(".scenario-col");

    // Header row
    let headerRow = ["Metric"];
    scenarios.forEach(s => {
        let titleInput = s.querySelector(".scenario-header input");
        headerRow.push(titleInput.value);
    });
    data.push(headerRow);

    // Data rows
    rows.forEach((row, rowIndex) => {
        let rowData = [row.innerText];
        scenarios.forEach(s => {
            let cells = s.querySelectorAll(".data-cell");
            let targetCell = cells[rowIndex];
            let input = targetCell.querySelector("input");
            let result = targetCell.querySelector(".result-cell");
            rowData.push(input ? input.value : (result ? result.innerText : ""));
        });
        data.push(rowData);
    });

    let ws = XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, "Sizer Results");
    XLSX.writeFile(wb, "WFM_Sizer_Export.xlsx");
}

addScenario();
</script>
</body>
</html>
